            <button type="submit" style={{ flex: 1, padding: '11px', background: '#111', border: 'none', borderRadius: 10, cursor: 'pointer', fontSize: 13, fontWeight: 600, color: '#fff', fontFamily: 'inherit' }}>저장 및 적용</button>

  /* ─── 메인 앱 ─── */
  const App = () => {
    const [view, setView] = useState('landing'); // 'landing' | 'stamp' | 'upload' | 'complete'
    const [selectedPlace, setSelectedPlace] = useState(null);
    const [uploadPlace, setUploadPlace] = useState(null);
    
    // Supabase 설정 관리
    const [config, setConfig] = useState(() => {
      return {
        supabaseUrl: localStorage.getItem('guro_supabase_url') || '',
        supabaseAnonKey: localStorage.getItem('guro_supabase_anon_key') || '',
        kakaoMapKey: localStorage.getItem('guro_kakao_map_key') || '',
      };
    });
    const [showSettings, setShowSettings] = useState(false);
    const [supabaseClient, setSupabaseClient] = useState(null);
    
    // 비즈니스 데이터 상태
    const [places, setPlaces] = useState(DEFAULT_PLACES);
    const [user, setUser] = useState(null);
    const [stamps, setStamps] = useState({}); // { [placeId]: photoUrl }
    const [loading, setLoading] = useState(false);
    const [uploading, setUploading] = useState(false);
    
    // 카카오맵 동적 로딩 참조
    const mapContainerRef = useRef(null);
    const mapLoadedRef = useRef(false);

    // Supabase Client 생성/변경 감지
    useEffect(() => {
      if (config.supabaseUrl && config.supabaseAnonKey) {
        try {
          const client = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
          setSupabaseClient(client);
        } catch (e) {
          console.error("Supabase client 생성 실패:", e);
        }
      } else {
        setSupabaseClient(null);
      }
    }, [config]);

    // 카카오 OAuth 콜백 및 로그인 상태 파싱
    useEffect(() => {
      if (!supabaseClient) return;

      const handleAuth = async () => {
        // 현재 세션 가져오기
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (session) {
          setUser(session.user);
          // 리다이렉트되어 들어오는 해시 정보 제거
          if (window.location.hash.includes('access_token')) {
            window.history.replaceState(null, document.title, window.location.pathname);
          }
          
          // 사용자 프로필 Upsert
          const { user_metadata } = session.user;
          const nickname = user_metadata?.name || user_metadata?.full_name || '모험가';
          const kakao_id = session.user.identities?.[0]?.id || session.user.id;
          
          await supabaseClient.from('user_profiles').upsert({
            id: session.user.id,
            kakao_id: kakao_id.toString(),
            nickname: nickname
          });
          
          // 유저 스탬프 가져오기
          fetchUserStamps(session.user.id);
        }

        // 로그인 상태 변경 이벤트 구독
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          if (session) {
            setUser(session.user);
            fetchUserStamps(session.user.id);
          } else {
            setUser(null);
            setStamps({});
          }
        });

        return () => subscription.unsubscribe();
      };

      handleAuth();
    }, [supabaseClient]);

    // 사용자 스탬프 목록 Fetch
    const fetchUserStamps = async (userId) => {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient
          .from('stamps')
          .select('place_id, photo_url')
          .eq('user_id', userId);
        
        if (error) throw error;
        
        const stampMap = {};
        data.forEach(s => {
          stampMap[s.place_id] = s.photo_url;
        });
        setStamps(stampMap);
      } catch (err) {
        console.error("스탬프 로드 실패:", err);
      }
    };

    // 장소 데이터 동적 Fetch (Supabase 연동 시)
    useEffect(() => {
      const loadPlaces = async () => {
        if (!supabaseClient) {
          setPlaces(DEFAULT_PLACES);
          return;
        }
        try {
          const { data, error } = await supabaseClient
            .from('places')
            .select('*')
            .order('order_num', { ascending: true });
          
          if (error) throw error;
          
          if (data && data.length > 0) {
            // 로컬의 메타데이터(사진, 컬러, 이모지 등)와 결합
            const enriched = data.map(p => {
              const local = DEFAULT_PLACES.find(l => l.order === p.order_num) || {};
              return {
                id: p.id,
                name: p.name,
                description: p.description,
                address: p.address,
                isRequired: p.is_required,
                order: p.order_num,
                category: local.category || '명소',
                duration: local.duration || '30분',
                budget: local.budget || 0,
                budgetLabel: local.budgetLabel || '무료',
                emoji: local.emoji || '📍',
                bg: local.bg || '#F4F4F0',
                accent: local.accent || '#71717a',
                photo: local.photo,
                photos: local.photos,
                tip: local.tip,
                isFinal: local.isFinal,
                hours: local.hours
              };
            });
            setPlaces(enriched);
          }
        } catch (err) {
          console.warn("DB 장소 로드 실패, 로컬 데이터로 대체:", err);
          setPlaces(DEFAULT_PLACES);
        }
      };

      loadPlaces();
    }, [supabaseClient]);

    // 카카오 맵 로드 & 초기화 (지연 로딩 적용)
    useEffect(() => {
      if (view !== 'landing') return;

      const kakaoKey = config.kakaoMapKey;
      if (!kakaoKey) return; // API 키가 설정 안 됐으면 이미지 맵 폴백을 보여줌

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && !mapLoadedRef.current) {
            loadKakaoMapScript(kakaoKey);
            mapLoadedRef.current = true;
          }
        });
      }, { threshold: 0.1 });

      if (mapContainerRef.current) {
        observer.observe(mapContainerRef.current);
      }

      return () => {
        if (mapContainerRef.current) observer.unobserve(mapContainerRef.current);
      };
    }, [view, config.kakaoMapKey]);

    const loadKakaoMapScript = (key) => {
      if (window.kakao && window.kakao.maps) {
        initMap();
        return;
      }
      const script = document.createElement('script');
      script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&autoload=false`;
      script.async = true;
      document.head.appendChild(script);
      script.onload = () => {
        window.kakao.maps.load(() => {
          initMap();
        });
      };
    };

    const initMap = () => {
      if (!mapContainerRef.current) return;
      
      // 구로구 중심부 좌표
      const options = {
        center: new window.kakao.maps.LatLng(37.485, 126.892),
        level: 5
      };
      const map = new window.kakao.maps.Map(mapContainerRef.current, options);

      // 장소들 마커 표시
      const bounds = new window.kakao.maps.LatLngBounds();
      
      // 장소별 대략적인 임시 위경도 매핑 (데모용)
      const COORDS = {
        1: { lat: 37.4854, lng: 126.9015 }, // 깔깔거리
        2: { lat: 37.4795, lng: 126.8964 }, // 넷마블
        3: { lat: 37.4812, lng: 126.8978 }, // 커피
        4: { lat: 37.4805, lng: 126.8931 }, // G밸리
        5: { lat: 37.4862, lng: 126.8864 }, // 남구로시장
        6: { lat: 37.4855, lng: 126.8858 }, // 린궁즈멘관
        7: { lat: 37.4848, lng: 126.8860 }  // 중국베이커리
      };

      places.forEach(p => {
        const coord = COORDS[p.order];
        if (coord) {
          const loc = new window.kakao.maps.LatLng(coord.lat, coord.lng);
          const marker = new window.kakao.maps.Marker({
            position: loc,
            map: map,
            title: p.name
          });
          
          const infowindow = new window.kakao.maps.InfoWindow({
            content: `<div style="padding:5px;font-size:12px;font-weight:700;">${p.name}</div>`
          });
          
          window.kakao.maps.event.addListener(marker, 'click', () => {
            setSelectedPlace(p);
          });
          
          bounds.extend(loc);
        }
      });
      
      // 지도가 모든 마커를 포함할 수 있게 맞춤
      map.setBounds(bounds);
    };

    // 설정 값 로컬스토리지 저장 및 재로드
    const handleSaveConfig = (newConfig) => {
      localStorage.setItem('guro_supabase_url', newConfig.supabaseUrl);
      localStorage.setItem('guro_supabase_anon_key', newConfig.supabaseAnonKey);
      localStorage.setItem('guro_kakao_map_key', newConfig.kakaoMapKey);
      setConfig(newConfig);
      window.location.reload();
    };

    // 카카오 로그인 인증 호출
    const handleKakaoLogin = async () => {
      if (!supabaseClient) {
        setShowSettings(true);
        alert("카카오 로그인을 사용하려면 먼저 Supabase URL과 Key를 설정해주세요!");
        return;
      }
      
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'kakao',
        options: {
          redirectTo: window.location.origin + window.location.pathname
        }
      });

      if (error) {
        console.error("로그인 시도 에러:", error);
        alert("카카오 로그인 실패. 설정을 다시 확인해 주세요.");
      }
    };

    const handleLogout = async () => {
      if (supabaseClient) {
        await supabaseClient.auth.signOut();
        setUser(null);
        setStamps({});
        setView('landing');
      }
    };

    // 스탬프 챌린지 페이지 진입 시 로그인 체크
    const handleStartChallenge = () => {
      if (!user) {
        handleKakaoLogin();
      } else {
        setView('stamp');
      }
    };

    // 사진 압축 및 업로드 + 스탬프 등록 (S-004)
    const handlePhotoUpload = async (event, placeId) => {
      const file = event.target.files[0];
      if (!file) return;

      if (!supabaseClient || !user) {
        alert("로그인 세션이 만료되었거나 설정이 올바르지 않습니다.");
        return;
      }

      setUploading(true);

      try {
        // 1. 클라이언트 사이드 이미지 압축
        const options = {
          maxSizeMB: 1.5,
          maxWidthOrHeight: 1280,
          useWebWorker: true,
        };
        const compressedFile = await imageCompression(file, options);
        
        // 2. Storage 업로드
        const fileExt = compressedFile.name.split('.').pop() || 'jpg';
        const fileName = `${user.id}/${placeId}_${Date.now()}.${fileExt}`;
        const { data: uploadData, error: uploadError } = await supabaseClient.storage
          .from('stamp-photos')
          .upload(fileName, compressedFile, {
            contentType: compressedFile.type,
            upsert: true
          });

        if (uploadError) throw uploadError;

        // 3. 사진 Public URL 가져오기
        const { data: { publicUrl } } = supabaseClient.storage
          .from('stamp-photos')
          .getPublicUrl(fileName);

        // 4. DB Stamps 테이블에 저장
        const { error: dbError } = await supabaseClient
          .from('stamps')
          .upsert({
            user_id: user.id,
            place_id: placeId,
            photo_url: publicUrl
          });

        if (dbError) throw dbError;

        // 5. 완료된 스탬프 목록 최신화
        await fetchUserStamps(user.id);
        setUploadPlace(null);
        setView('stamp');
        alert("스탬프가 정상적으로 적립되었습니다!");

        // 6. 완주 여부 즉시 검증
        checkIfAllComplete();
      } catch (err) {
        console.error("업로드 에러:", err);
        alert(`인증 업로드 실패: ${err.message || '다시 시도해 주세요.'}`);
      } finally {
        setUploading(false);
      }
    };

    // 스탬프 완주 서버 측 검증 (RPC 호출)
    const checkIfAllComplete = async () => {
      if (!supabaseClient || !user) return;
      try {
        const { data: isComplete, error } = await supabaseClient.rpc('is_stamp_complete', {
          p_user_id: user.id
        });
        
        if (error) throw error;
        
        if (isComplete) {
          setView('complete');
        }
      } catch (err) {
        console.error("완주 상태 확인 실패:", err);
        // DB Function 미생성 시 로컬 판정 폴백
        const requiredIds = places.filter(p => p.isRequired).map(p => p.id);
        const hasAll = requiredIds.every(id => stamps[id]);
        if (hasAll) {
          setView('complete');
        }
      }
    };

    // 필수 스탬프 카운트
    const requiredPlaces = places.filter(p => p.isRequired);
    const completedRequiredCount = requiredPlaces.filter(p => stamps[p.id]).length;

    // 공통 헤더
    const renderHeader = () => (
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#111', padding: '14px 22px', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
        <button onClick={() => setView('landing')} style={{ background: 'none', border: 'none', color: '#fff', fontSize: 16, fontWeight: 900, cursor: 'pointer', fontFamily: 'inherit' }}>
          📍 구로 반나절
        </button>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          {user ? (
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.7)', fontWeight: 500 }}>
                {user.user_metadata?.name || '모험가'} 님
              </span>
              <button onClick={handleLogout} style={{ padding: '4px 10px', background: 'rgba(255,255,255,0.1)', border: 'none', borderRadius: 8, color: '#f87171', fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>로그아웃</button>

            <button
              onClick={() => setView('stamp')}
              style={{ width: '100%', padding: '16px', background: '#f4f4f5', color: '#52525b', border: 'none', borderRadius: 14, cursor: 'pointer', fontSize: 14, fontWeight: 700, fontFamily: 'inherit' }}
            >
              스탬프 리스트 조회
            </button>
          </div>
        </div>
      );
    };

    return (
      <div style={{ background: '#EDECE6', minHeight: '100vh' }}>
        {renderHeader()}
        
        {view === 'landing' && renderLanding()}
        {view === 'stamp' && renderStampList()}
        {view === 'upload' && renderUpload()}
        {view === 'complete' && renderComplete()}

        {selectedPlace && <DetailModal place={selectedPlace} onClose={() => setSelectedPlace(null)} />}
        
        <SettingsModal 
          isOpen={showSettings} 
          onClose={() => setShowSettings(false)} 
          config={config} 
          onSave={handleSaveConfig} 
        />
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
