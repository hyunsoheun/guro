<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>신나는 모험 in 구로 — 서울 속 이색 반나절 코스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #EDECE6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes stampPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217,119,6,0.35); }
      60% { box-shadow: 0 0 0 7px rgba(217,119,6,0); }
    }

    .place-btn { transition: transform 0.14s ease, box-shadow 0.14s ease; }
    .place-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1) !important; }
    .place-btn:active { transform: scale(0.985) !important; }

    .stamp-preview-btn { transition: transform 0.14s ease, opacity 0.14s; }
    .stamp-preview-btn:hover { opacity: 0.85; transform: scale(1.03); }
    .stamp-preview-btn:active { transform: scale(0.97); }

    .cta-btn { transition: opacity 0.14s, transform 0.14s; }
    .cta-btn:hover { opacity: 0.9; }
    .cta-btn:active { transform: scale(0.98); }

    .kakao-btn { transition: opacity 0.14s, transform 0.14s; }
    .kakao-btn:hover { opacity: 0.88; }
    .kakao-btn:active { transform: scale(0.98); }

    .close-btn:hover { background: #e4e4e7 !important; }

    .tag-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; border-radius: 20px; padding: 3px 10px; }
  </style>
</head>
<body>
<div id="root"></div>

    },
    {
      id: 'gvalley', order: 4,
      name: 'G밸리 산업 박물관',
      category: '역사 체험', duration: '30분', budget: 0, budgetLabel: '무료',
      description: '구로공단의 역사를 VR로. 무료인데 너무 알차요!',
      detail: '1960~70년대 구로공단의 역사를 담은 박물관. 당시 공장 노동자들의 삶과 한국 산업화 역사를 VR 체험을 포함해 생생하게 느낄 수 있어요. 무료라는 게 믿기지 않을 정도로 알찬 구성.',

      hours: '09:00 ~ 18:00 (월요일 휴관)',
      emoji: '🏭', bg: '#E3F2FD', accent: '#1565C0', isRequired: false,
      photo: 'uploads/산업박물관 vr.jpg',
      photos: ['uploads/산업박물관 vr.jpg', 'uploads/산업박물관2 vr.jpg', 'uploads/산업박물관3 vr.jpg', 'uploads/산업박물곤4.jpg'],
    },
    {
      id: 'market', order: 5,
      name: '남구로 시장',
      category: '시장 탐방', duration: '1시간', budget: 10000, budgetLabel: '₩10,000',
      description: '서울 속 작은 중국. 이국적인 골목 탐방!',
      detail: '색안경만 걷고 보면 서울 한복판의 작은 중국. 중국 식재료와 간판, 거리 분위기가 마치 중국 소도시에 온 듯한 이색 경험을 선사해요. 다양한 중국 간식을 저렴하게 맛볼 수 있고 골목 구석구석 탐방하는 재미가 있어요.',

      photo: 'uploads/남구로시장6.jpg',
      photos: ['uploads/남구로시장6.jpg', 'uploads/남구로시장1.jpg', 'uploads/남구로시장 2.jpg', 'uploads/남구로시장3.jpg', 'uploads/남구로시장4.jpg', 'uploads/남구로시장5.jpg', 'uploads/남구로시장.jpg'],
    },
    {
      id: 'restaurant', order: 6,
      name: '린궁즈멘관',
      category: '중국 정통 음식', duration: '40분', budget: 10000, budgetLabel: '₩10,000',
      description: '중국 본토 맛 그대로. 현지인도 인정한 정통 중식.',
      detail: '남구로 시장 인근에 위치한 정통 중국 음식점. 중국 현지 요리사가 만드는 본토 맛으로 유명해요. 양이 푸짐하고 가격도 착한 편. 중국 음식을 제대로 맛보고 싶다면 꼭 방문.',
      address: '서울 구로구 남구로 인근',
      transport: '남구로 시장에서 도보 3분',
      tip: '마라탕과 훠궈가 시그니처 메뉴. 매운 음식에 약한 분은 주의!',
      hours: '11:00 ~ 21:00',
      emoji: '🥟', bg: '#FCE4EC', accent: '#AD1457', isRequired: true,
      photo: 'uploads/린궁즈멘관.jpg',
      photos: ['uploads/린궁즈멘관.jpg', 'uploads/린궁즈멘관 메뉴판.jpg'],
    },
    {
      id: 'bakery', order: 7,
      name: '중국 베이커리',

      detail: '구로 반나절 코스의 피날레. 핵심 3곳 스탬프를 완료한 후 이곳에서 완주 사은품(중국 호떡 1개)을 받을 수 있어요. 중국식 호떡과 각종 호빵이 인기 메뉴.',
      address: '서울 구로구 남구로 인근',
      transport: '이전 장소에서 도보 2분',
      tip: '스탬프 완주 화면을 캡처해서 점원에게 보여주면 호떡 1개 무료!',

      photo: 'uploads/중국빵.jpg',
    },
  ];

  /* ─── 사진 플레이스홀더 ─── */
  const PhotoThumb = ({ place, size = 72, radius = 10 }) => (
    <div style={{
      width: size, height: size, borderRadius: radius,
      background: place.bg, flexShrink: 0, overflow: 'hidden', position: 'relative',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      {place.photo ? (
        <img src={place.photo} alt={place.name} style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block', padding: '4px' }} />
      ) : (
        <>
          <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} aria-hidden="true">
            <defs>
              <pattern id={'th_' + place.id} width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="9" stroke={place.accent} strokeWidth="1" opacity="0.12" />
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill={'url(#th_' + place.id + ')'} />
          </svg>
          <span style={{ fontSize: size * 0.38, position: 'relative', zIndex: 1, lineHeight: 1 }}>{place.emoji}</span>
        </>
      )}
    </div>
  );

  const PhotoHero = ({ place }) => {
    const [active, setActive] = useState(0);
    const gallery = place.photos || (place.photo ? [place.photo] : null);
    if (!gallery) return (
      <div style={{ height: 220, background: place.bg, position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} aria-hidden="true">
          <defs>
            <pattern id={'mh_' + place.id} width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="14" stroke={place.accent} strokeWidth="1.5" opacity="0.1" />
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill={'url(#mh_' + place.id + ')'} />
        </svg>
        <span style={{ fontSize: 88, position: 'relative', zIndex: 1, lineHeight: 1 }}>{place.emoji}</span>
        <div style={{ position: 'absolute', bottom: 12, right: 14, zIndex: 2, background: 'rgba(255,255,255,0.82)', backdropFilter: 'blur(6px)', borderRadius: 8, padding: '3px 9px', fontSize: 11, color: '#71717a' }}>실사진 준비 중</div>
      </div>
    );
    return (
      <div style={{ position: 'relative', background: place.bg }}>
        <div style={{ height: 240, overflow: 'hidden', position: 'relative' }}>
          <img src={gallery[active]} alt={place.name} style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block', transition: 'opacity 0.2s' }} />
        </div>
        {gallery.length > 1 && (
          <div style={{ display: 'flex', gap: 8, padding: '10px 14px', overflowX: 'auto', background: '#fff' }}>
            {gallery.map((src, i) => (
              <button key={i} onClick={() => setActive(i)} style={{ flexShrink: 0, width: 60, height: 60, borderRadius: 10, overflow: 'hidden', border: active === i ? '2.5px solid #D97706' : '2px solid #e4e4de', padding: 0, cursor: 'pointer', background: 'none', transition: 'border 0.15s' }}>
                <img src={src} alt={place.name + ' ' + (i + 1)} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
              </button>
            ))}
          </div>
        )}
      </div>
    );
  };

  /* ─── 장소 카드 ─── */
  const PlaceCard = ({ place, idx, onSelect }) => {
    const isLast = place.order === PLACES.length;
    return (
      <div style={{ display: 'flex', animation: `cardIn 0.38s ease ${idx * 0.06}s both` }}>
        {/* 타임라인 */}
        <div style={{ width: 46, display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: 0 }}>
          <div style={{
            width: 32, height: 32, borderRadius: '50%', flexShrink: 0,
            background: place.isRequired ? '#D97706' : '#ddddd7',
            color: place.isRequired ? '#fff' : '#888880',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 13, fontWeight: 700, zIndex: 1,
            animation: place.isRequired ? 'stampPulse 2.4s 1s infinite' : 'none',
          }}>{place.order}</div>
          {!isLast && (
            <div style={{
              width: 2, flex: 1, minHeight: 20, marginTop: 5, marginBottom: 5,
              background: 'repeating-linear-gradient(to bottom, #c8c8c2 0 4px, transparent 4px 9px)',
            }} />
          )}
        </div>

        {/* 카드 */}
        <button
          className="place-btn"
          onClick={() => onSelect(place)}
          style={{
            flex: 1, textAlign: 'left', background: '#fff', border: 'none',
            cursor: 'pointer', borderRadius: 18, padding: '14px 14px 14px 4px',
            display: 'flex', gap: 12, alignItems: 'flex-start',
            marginBottom: isLast ? 0 : 12,
            boxShadow: '0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            position: 'relative', overflow: 'hidden', fontFamily: 'inherit',
          }}
        >
          {place.isRequired && (
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: '#D97706', borderRadius: '0 2px 2px 0' }} />
          )}
          <div style={{ paddingLeft: place.isRequired ? 8 : 0, flex: 1, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <PhotoThumb place={place} size={72} radius={11} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 3, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 11, color: '#888880', fontWeight: 500 }}>{place.category}</span>
                {place.isRequired && (
                  <span style={{ fontSize: 10, background: '#D97706', color: '#fff', borderRadius: 5, padding: '1px 7px', fontWeight: 700, flexShrink: 0 }}>★ 스탬프</span>
                )}
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, color: '#111', marginBottom: 5, lineHeight: 1.3 }}>{place.name}</div>
              <div style={{ fontSize: 13, color: '#52525b', lineHeight: 1.55, marginBottom: 9 }}>{place.description}</div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <span style={{ fontSize: 11, color: '#888880' }}>⏱ {place.duration}</span>
                <span style={{ color: '#d4d4ce' }}>·</span>
                <span style={{ fontSize: 11, color: place.budget === 0 ? '#059669' : '#888880', fontWeight: place.budget === 0 ? 700 : 400 }}>
                  {place.budget === 0 ? '● 무료' : place.budgetLabel}
                </span>
              </div>
            </div>
            <span style={{ color: '#c8c8c2', fontSize: 20, alignSelf: 'center', flexShrink: 0, paddingRight: 2, lineHeight: 1 }}>›</span>
          </div>
        </button>
      </div>
    );
  };

  /* ─── 상세 모달 ─── */
  const DetailModal = ({ place, onClose }) => {
    useEffect(() => {
      const prev = document.body.style.overflow;
      document.body.style.overflow = 'hidden';
      const onKey = e => { if (e.key === 'Escape') onClose(); };
      window.addEventListener('keydown', onKey);
      return () => { document.body.style.overflow = prev; window.removeEventListener('keydown', onKey); };
    }, [onClose]);

    const stats = [
      { icon: '⏱', val: place.duration, label: '소요 시간', green: false },
      { icon: place.budget === 0 ? '🎁' : '💰', val: place.budgetLabel, label: '예상 비용', green: place.budget === 0 },
      ...(place.hours ? [{ icon: '🕐', val: place.hours, label: '운영 시간', green: false }] : []),
    ];

    return (
      <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }} onClick={onClose}>
        <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.52)', animation: 'fadeIn 0.2s' }} />
        <div
          onClick={e => e.stopPropagation()}
          style={{
            position: 'relative', zIndex: 1, background: '#fff',
            borderRadius: '24px 24px 0 0', width: '100%', maxWidth: 480,
            maxHeight: '91vh', overflowY: 'auto', overflowX: 'hidden',
            animation: 'slideUp 0.3s cubic-bezier(0.32,0.72,0,1)',
          }}
        >
          {/* 핸들 */}
          <div style={{ position: 'sticky', top: 0, background: '#fff', zIndex: 10, padding: '12px 0 6px', display: 'flex', justifyContent: 'center' }}>
            <div style={{ width: 36, height: 4, borderRadius: 2, background: '#e4e4de' }} />
          </div>

          <PhotoHero place={place} />

          <div style={{ padding: '20px 20px 52px' }}>
            {/* 타이틀 */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
              <div style={{ flex: 1, marginRight: 12 }}>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8 }}>
                  <span style={{ fontSize: 11, background: place.bg, color: place.accent, borderRadius: 6, padding: '3px 10px', fontWeight: 600 }}>{place.category}</span>
                  {place.isRequired && (

              <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>

  /* ─── 스탬프 도전 모달 ─── */
  const StampModal = ({ onClose }) => {

      document.body.style.overflow = 'hidden';
      const onKey = e => { if (e.key === 'Escape') onClose(); };
      window.addEventListener('keydown', onKey);
      return () => { document.body.style.overflow = prev; window.removeEventListener('keydown', onKey); };
    }, [onClose]);

    return (
      <div style={{ position: 'fixed', inset: 0, zIndex: 300, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }} onClick={onClose}>
        <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.52)', animation: 'fadeIn 0.2s' }} />

          </div>

          <button
            className="kakao-btn"
            onClick={onClose}
            style={{ width: '100%', padding: '17px 24px', background: '#FEE500', color: '#111', border: 'none', borderRadius: 16, cursor: 'pointer', fontSize: 16, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, fontFamily: 'inherit' }}

        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
